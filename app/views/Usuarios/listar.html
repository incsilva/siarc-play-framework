#{extends 'main.html' /}
#{set title:'Lista de Usuários' /}

<div class="container">
	<h3 style="text-align: center">Usuários</h3>
	<hr>
	
	<form action="@{Usuarios.listar}">
		<div class="row">
			<div class="col-8">
				<input style="width: 940px;" type="text" name="termo" placeholder="Pesquisar" class="form-control" />
			</div>
			<input  type="submit" value="Pesquisar" class="col-2 btn btn-success" />
		</div>
	</form>
	<hr>

<div class="table-responsive">
	<table class="table table-striped table-hover">
		<thead>
		 	<tr>
	      		<th>Nome</th>
	      		<th>Email</th>
	      		<th>Matrícula</th>
	      		<th>Função</th>
	      		<th>Ações</th>
	      	</tr>
		</thead>
		<tbody>
			#{list items: usuarios, as:'usuario'}
			<tr>
	      		<td>${usuario.nome}</td>
	      		<td>${usuario.email}</td>
	      		<td>${usuario.matricula}</td>
	      		<td>${usuario.funcao}</td>
	      		<td>
	      			<a href="@{Usuarios.detalhar(usuario.id)}" class="btn btn-info"><i class="bi bi-info-circle"></i></a>
	      			<a href="@{Usuarios.editar(usuario.id)}" class="btn btn-primary"><i class="bi bi-pencil-square"></i></a>
	      			<a href="@{Usuarios.remover(usuario.id)}" class="btn btn-danger"><i class="bi bi-trash"></i></a>
	      		</td>
	      	</tr>
	      	#{/list}
		</tbody>
	</table>
	</div>
	<a href="@{Usuarios.cadastrar}" class="btn btn-primary">Novo</a>
	<a href="@{Usuarios.menu}" class="btn btn-primary">Voltar</a>
</div>
